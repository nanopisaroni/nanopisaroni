<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Essays - Leandro Pisaroni</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #fff;
      --text: #1a1a1a;
      --link: #2a5db0;
      --visited: #555;
      --rule: #e6e6e6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 18px;
      line-height: 1.6;
    }

    a {
      color: var(--link);
    }

    a:visited {
      color: var(--visited);
    }

    .site {
      width: min(100% - 40px, 650px);
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--rule);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.3;
    }

    .nav a {
      color: var(--link);
      text-decoration: none;
    }

    .nav a:visited {
      color: var(--visited);
    }

    .nav a:hover {
      text-decoration: underline;
    }

    main {
      padding-top: 44px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 7vw, 48px);
      line-height: 1.12;
      font-weight: 400;
    }

    p {
      margin: 0 0 26px;
    }

    .essay-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .essay-list li {
      display: flex;
      gap: 14px;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 14px;
    }

    .date {
      flex: 0 0 auto;
      color: #666;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
    }

    @media (max-width: 520px) {
      .site {
        width: min(100% - 28px, 650px);
        padding-top: 24px;
      }

      .essay-list li {
        display: block;
      }

      .date {
        display: block;
        margin-top: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="site">
    <nav class="nav" aria-label="Main navigation">
      <a href="index.html">Home</a>
      <a href="essays.html">Essays</a>
      <a href="about.html">About</a>
      <a href="rss.xml">RSS</a>
    </nav>

    <main>
      <h1>Essays</h1>
      <p>Lista completa de ensayos, en orden cronologico inverso.</p>

      <ul class="essay-list">
        <li>
          <a href="essays/ensayo-ejemplo.html">Bienvenido</a>
          <span class="date">5 de mayo de 2026</span>
        </li>
      </ul>
    </main>
  </div>
</body>
</html>
